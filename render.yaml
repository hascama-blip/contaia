# ============================================================
#  Render Blueprint para ContaIA
#  Render lee este archivo y crea el servicio automáticamente.
#  Doc: https://render.com/docs/blueprint-spec
# ============================================================
services:
  - type: web
    name: contaia
    runtime: node
    # El buzón usa un navegador headless (@sparticuz/chromium) que consume RAM:
    # usa plan "standard" (2 GB). El SIRE y lo demás funcionan en planes menores.
    # Plan FREE para pruebas (2–5 usuarios). El buzón (Chromium) y el OCR
    # necesitan más RAM: para eso, cambia a "standard" y descomenta el disco.
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: "22"
      # Fuente FIJA: decolecta.com (datos reales de SUNAT).
      - key: SUNAT_PROVIDER
        value: decolecta
      # Token de decolecta.com: NO se guarda en el código.
      # Render te pedirá pegarlo al desplegar (queda guardado en su panel,
      # pestaña Environment). Sin este token la consulta mostrará error.
      - key: DECOLECTA_TOKEN
        sync: false
      # En FREE no hay disco persistente: los datos viven en ./data (efímeros).
      # Al pasar a un plan con disco, descomenta DATA_DIR y el bloque "disk".
      # - key: DATA_DIR
      #   value: /var/data

    # --- Almacenamiento persistente (requiere plan de pago, no FREE) ----------
    # disk:
    #   name: contaia-data
    #   mountPath: /var/data
    #   sizeGB: 1
