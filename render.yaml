# ============================================================
#  Render Blueprint para ContaIA
#  Render lee este archivo y crea el servicio automáticamente.
#  Doc: https://render.com/docs/blueprint-spec
# ============================================================
services:
  - type: web
    name: contaia
    runtime: node
    # El buzón usa un navegador headless (@sparticuz/chromium) que consume RAM:
    # usa plan "standard" (2 GB). El SIRE y lo demás funcionan en planes menores.
    plan: standard
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: "22"
      # Fuente FIJA: decolecta.com (datos reales de SUNAT).
      - key: SUNAT_PROVIDER
        value: decolecta
      # Token de decolecta.com: NO se guarda en el código.
      # Render te pedirá pegarlo al desplegar (queda guardado en su panel,
      # pestaña Environment). Sin este token la consulta mostrará error.
      - key: DECOLECTA_TOKEN
        sync: false
      # Carpeta de datos = disco persistente montado abajo. Así los clientes,
      # el SIRE y las declaraciones NO se borran en cada despliegue.
      - key: DATA_DIR
        value: /var/data

    # --- Almacenamiento persistente ------------------------------------------
    # Disco que sobrevive a reinicios y despliegues (incluido en plan standard).
    # 1 GB alcanza de sobra para cientos de clientes en JSON.
    disk:
      name: contaia-data
      mountPath: /var/data
      sizeGB: 1
