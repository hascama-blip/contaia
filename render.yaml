# ============================================================
#  Render Blueprint para ContaIA
#  Render lee este archivo y crea el servicio automáticamente.
#  Doc: https://render.com/docs/blueprint-spec
# ============================================================
services:
  - type: web
    name: contaia
    runtime: node
    # El buzón usa un navegador headless (@sparticuz/chromium) que consume RAM:
    # plan "pro max" (16 GB, 4 CPU) para correr ~10 extracciones SUNAT a la vez.
    # (Si se baja de plan, bajar también MAX_NAVEGADORES: ~2 por cada 2 GB libres.)
    plan: pro max
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: "22"
      # Fuente FIJA: decolecta.com (datos reales de SUNAT).
      - key: SUNAT_PROVIDER
        value: decolecta
      # Cola de navegadores: cuántos Chromium locales pueden correr A LA VEZ.
      # Regla: ~500 MB por navegador + ~1 GB de la app. Con 16 GB → 10 es seguro.
      # (Va en el blueprint porque las variables del panel no siempre se inyectan.)
      - key: MAX_NAVEGADORES
        value: "10"
      # Token de decolecta.com: NO se guarda en el código.
      # Render te pedirá pegarlo al desplegar (queda guardado en su panel,
      # pestaña Environment). Sin este token la consulta mostrará error.
      - key: DECOLECTA_TOKEN
        sync: false
      # NOTA: BROWSER_WS_URL (navegador remoto Browserless) se define como
      # variable NORMAL en el panel de Render (Environment) — NO en el blueprint,
      # para que el sync no la sobrescriba.
      # Datos persistentes: se guardan en el disco montado en /var/data (abajo),
      # así los clientes y la configuración NO se borran en cada despliegue.
      - key: DATA_DIR
        value: /var/data

    # --- Almacenamiento persistente (disco de Render, requiere plan de pago) ---
    disk:
      name: contaia-data
      mountPath: /var/data
      sizeGB: 1
